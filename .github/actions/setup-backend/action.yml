name: 'Setup Backend Services'
description: 'Sets up and starts backend services for E2E tests using docker-compose'

inputs:
  backend-tag:
    description: 'Backend image tag to pull from GHCR'
    required: false
    default: 'latest'
  backend-repo:
    description: 'Backend repository name'
    required: false
    default: 'investlab-app/backend'
  backend-repo-ref:
    description: 'Backend repository branch/tag'
    required: false
    default: 'develop'

outputs:
  backend-url:
    description: 'URL of the backend service'
    value: 'http://localhost:8000'

runs:
  using: 'composite'
  steps:
    - name: Checkout backend repository
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.backend-repo }}
        path: backend
        token: ${{ secrets.BACKEND_READ_TOKEN }}
        ref: ${{ inputs.backend-repo-ref }}

    - name: Create environment file for docker-compose
      shell: bash
      run: |
        cat > backend/.env << EOF
        DEBUG=false
        SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
        ALLOWED_HOSTS=*
        POSTGRES_HOST=postgres
        POSTGRES_DB=template_db
        POSTGRES_USER=user
        POSTGRES_PASSWORD=password
        POSTGRES_PORT=5432
        CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
        CLERK_JWT_KEY=${{ secrets.CLERK_JWT_KEY }}
        CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
        CLERK_ISSUER=${{ secrets.CLERK_ISSUER }}
        POLYGON_SECRET_KEY=${{ secrets.POLYGON_SECRET_KEY }}
        ALPACA_PUBLIC_KEY=${{ secrets.ALPACA_PUBLIC_KEY }}
        ALPACA_SECRET_KEY=${{ secrets.ALPACA_SECRET_KEY }}
        ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
        FROM_EMAIL=${{ secrets.FROM_EMAIL }}
        EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}
        EMAIL_FILE_PATH=${{ secrets.EMAIL_FILE_PATH }}
        VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
        VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
        REDIS_HOST=redis
        REDIS_PORT=6379
        REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
        OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        OPENAI_API_URL=${{ secrets.OPENAI_API_URL }}
        OPENAI_TRANSLATING_MODEL=${{ secrets.OPENAI_TRANSLATING_MODEL }}
        EOF

    - name: Pull backend image from GHCR
      shell: bash
      run: |
        cd backend
        docker pull ghcr.io/${{ inputs.backend-repo }}:${{ inputs.backend-tag }}
        docker tag ghcr.io/${{ inputs.backend-repo }}:${{ inputs.backend-tag }} investlab-backend:latest

    - name: Start backend services with docker-compose
      shell: bash
      run: |
        cd backend
        docker compose --profile default up -d --wait
